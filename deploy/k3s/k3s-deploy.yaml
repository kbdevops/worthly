# NetWorth k3s deployment (reference manifest)
# Apply: kubectl apply -f k3s-deploy.yaml
#
# This mounts a PVC at /app/data for financial data files.
# Set DATA_DIR=/app/data so the app reads/writes from the volume.
# On first deploy, the entrypoint copies .example.json templates into the volume.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: worthly-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worthly
  labels:
    app: worthly
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: worthly
  template:
    metadata:
      labels:
        app: worthly
    spec:
      containers:
        - name: worthly
          image: worthly:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5050
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: DATA_DIR
              value: "/app/data"
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: worthly-data
---
apiVersion: v1
kind: Service
metadata:
  name: worthly
spec:
  selector:
    app: worthly
  ports:
    - port: 5050
      targetPort: 5050
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: worthly
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: worthly.home
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: worthly
                port:
                  number: 5050
